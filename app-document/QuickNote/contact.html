<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ — QuickNote</title>
<link rel="icon" href="/public/favicon.svg" type="image/svg+xml">
<meta name="description" content="QuickNote へのお問い合わせ">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/src/styles/shared.css">
<style>
  .doc-section {
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 32px 64px;
  }
  .doc-title {
    font-family: var(--sans);
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--text-primary);
  }
  .doc-app-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-tertiary);
    margin-bottom: 16px;
    letter-spacing: 0.3px;
  }
  .doc-description {
    font-size: 14px;
    font-weight: 300;
    color: var(--text-secondary);
    line-height: 1.8;
    margin-bottom: 40px;
  }
  .contact-list {
    list-style: none;
  }
  .contact-list li a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0;
    border-bottom: 0.5px solid var(--border);
    text-decoration: none;
    color: var(--text-primary);
    transition: color 0.15s;
  }
  .contact-list li:first-child a {
    border-top: 0.5px solid var(--border);
  }
  .contact-list li a:hover {
    color: var(--text-secondary);
  }
  .contact-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .contact-label {
    font-size: 15px;
    font-weight: 400;
  }
  .contact-desc {
    font-size: 12px;
    font-weight: 300;
    color: var(--text-tertiary);
  }
  .contact-arrow {
    font-size: 13px;
    color: var(--text-tertiary);
    transition: transform 0.15s;
  }
  .contact-list li a:hover .contact-arrow {
    transform: translate(2px, -2px);
  }
  @media (max-width: 640px) {
    .doc-section { padding: 32px 20px 48px; }
    .doc-title { font-size: 19px; }
  }
</style>
</head>
<body>

<!-- ===== ナビゲーション ===== -->
<nav></nav>

<!-- ===== コンテンツ ===== -->
<div class="doc-section fade-up">
  <h1 class="doc-title">お問い合わせ</h1>
  <p class="doc-app-name">QuickNote</p>
  <p class="doc-description">QuickNote に関するご質問、不具合の報告、ご要望などがございましたら、以下のいずれかの方法でお気軽にお問い合わせください。</p>

  <ul class="contact-list">
    <li>
      <a href="https://forms.gle/68uVrDj6ACmN9PNu8" target="_blank" rel="noopener">
        <div class="contact-info">
          <span class="contact-label">お問い合わせフォーム</span>
          <span class="contact-desc">Google フォームから送信</span>
        </div>
        <span class="contact-arrow">↗</span>
      </a>
    </li>
    <li>
      <a href="mailto:riverapp.jp@gmail.com">
        <div class="contact-info">
          <span class="contact-label">メールで問い合わせ</span>
          <span class="contact-desc">riverapp.jp@gmail.com</span>
        </div>
        <span class="contact-arrow">↗</span>
      </a>
    </li>
  </ul>
</div>

<!-- ===== フッター ===== -->
<footer data-privacy-href="/app-document/QuickNote/privacy-policy" data-contact-href="/app-document/QuickNote/contact"></footer>

<script src="/src/js/shared-components.js"></script>
</body>
</html>
